# ==========================================
# Future Namibia Bank - Application Config
# Slogan: Payments Made Better
# ==========================================

# Server
server.port=8080
spring.application.name=FutureNamibiaBank

# ==========================================
# MySQL Database
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/fnb_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# JWT Configuration
# ==========================================
fnb.jwt.secret=FNBSecretKey2024PaymentsMadeBetterNamibia!SecureKey256Bits
fnb.jwt.expiration=86400000

# ==========================================
# CORS
# ==========================================
fnb.cors.allowed-origins=http://localhost:4200

# ==========================================
# Actuator
# ==========================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
info.app.name=Future Namibia Bank
info.app.slogan=Payments Made Better
info.app.version=1.0.0
